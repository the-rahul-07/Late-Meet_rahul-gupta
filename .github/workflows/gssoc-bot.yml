name: GSSoC Assistant Bot

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  assistant:
    runs-on: ubuntu-latest
    steps:
      - name: GSSoC Bot Action
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const eventName = context.eventName;

            const STAR_REMINDER = "\n\n---\n\n*Please consider starring the repository ⭐ to show your support!*";

            if (eventName === 'issues') {
              const issue = context.payload.issue;
              const opener = issue.user.login;
              const isBot = issue.user.type === 'Bot';

              // 1. Compulsory labels
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: ['gssoc', 'gssoc:approved']
              });

              // 2. Smart labeling based on title/body
              const title = issue.title.toLowerCase();
              const body = (issue.body || "").toLowerCase();
              let labels = [];
              if (title.includes("bug") || body.includes("bug")) labels.push("bug");
              if (title.includes("docs") || title.includes("readme") || body.includes("documentation")) labels.push("documentation");
              if (title.includes("ui") || title.includes("css") || title.includes("style") || title.includes("design") || body.includes("ui")) labels.push("type:design");
              if (title.includes("feature") || title.includes("feat") || body.includes("feature")) labels.push("enhancement");
              if (title.includes("performance") || body.includes("performance")) labels.push("performance");
              if (title.includes("test") || body.includes("testing")) labels.push("type:testing");

              if (labels.length > 0) {
                await github.rest.issues.addLabels({ owner, repo, issue_number: issue.number, labels });
              }

              // 3. Auto-assign the issue to opener
              if (!isBot && opener !== owner) {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number: issue.number,
                  assignees: [opener]
                });

                const welcomeMsg = `👋 Hi @${opener}, thank you for opening this issue! I have automatically assigned this issue to you since you raised it.\n\n` +
                  `Please follow the contribution guidelines and submit a PR. Let us know if you need any assistance! 🚀` + STAR_REMINDER;

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: welcomeMsg
                });
              }

            } else if (eventName === 'issue_comment') {
              const comment = context.payload.comment;
              const commenter = comment.user.login;
              const isBot = comment.user.type === 'Bot';

              if (isBot || commenter === owner) return;

              const commentBody = comment.body.toLowerCase();
              const assignKeywords = [
                "assign me",
                "assign this to me",
                "please assign",
                "can i work on this",
                "i want to work on this",
                "i'd like to work on this",
                "/assign"
              ];

              const matchesAssign = assignKeywords.some(keyword => commentBody.includes(keyword));
              if (matchesAssign) {
                // Check if issue is already assigned
                const { data: issue } = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number: context.issue.number
                });

                if (issue.assignees && issue.assignees.length > 0) {
                  const alreadyAssignedMsg = `Hi @${commenter}! This issue is already assigned to @${issue.assignees.map(a => a.login).join(', @')}. Please look for other unassigned issues to work on. 🚀` + STAR_REMINDER;
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: context.issue.number,
                    body: alreadyAssignedMsg
                  });
                } else {
                  await github.rest.issues.addAssignees({
                    owner,
                    repo,
                    issue_number: context.issue.number,
                    assignees: [commenter]
                  });

                  const assignMsg = `Hello @${commenter}! You have been assigned to this issue. 🚀\n\n` +
                    `Please make sure you have read our contribution guidelines. Happy coding!` + STAR_REMINDER;

                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: context.issue.number,
                    body: assignMsg
                  });
                }
              }

            } else if (eventName === 'pull_request_target') {
              const pr = context.payload.pull_request;
              const creator = pr.user.login;
              const isBot = pr.user.type === 'Bot';
              const action = context.payload.action;

              if (action === 'opened') {
                // 1. Compulsory labels
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: pr.number,
                  labels: ['gssoc', 'gssoc:approved']
                });

                // 2. Smart PR labeling
                const title = pr.title.toLowerCase();
                const body = (pr.body || "").toLowerCase();
                let labels = [];
                if (title.includes("bug") || body.includes("bug") || title.includes("fix")) labels.push("bug");
                if (title.includes("docs") || title.includes("readme") || body.includes("documentation")) labels.push("type:docs");
                if (title.includes("ui") || title.includes("css") || title.includes("style") || title.includes("design") || body.includes("ui")) labels.push("type:design");
                if (title.includes("feature") || title.includes("feat") || body.includes("feature")) labels.push("type:feature");
                if (title.includes("performance") || body.includes("performance")) labels.push("performance");
                if (title.includes("test") || body.includes("testing")) labels.push("type:testing");

                // 3. PR Size labeling
                const additions = pr.additions;
                const deletions = pr.deletions;
                const changedLines = additions + deletions;
                let sizeLabel = "size/XS";
                if (changedLines >= 10 && changedLines < 50) sizeLabel = "size/S";
                else if (changedLines >= 50 && changedLines < 250) sizeLabel = "size/M";
                else if (changedLines >= 250 && changedLines < 1000) sizeLabel = "size/L";
                else if (changedLines >= 1000) sizeLabel = "size/XL";
                labels.push(sizeLabel);

                if (labels.length > 0) {
                  await github.rest.issues.addLabels({ owner, repo, issue_number: pr.number, labels });
                }

                // 4. Linked Issue verification
                const linkedIssueRegex = /(?:fixes|closes|resolves)\s+#(\d+)/i;
                const match = pr.body ? pr.body.match(linkedIssueRegex) : null;
                const linkedIssueNumber = match ? parseInt(match[1], 10) : null;

                let welcomeMsg = `👋 Thank you @${creator} for your contribution to Late-Meet!\n\n`;

                if (!linkedIssueNumber) {
                  await github.rest.issues.addLabels({ owner, repo, issue_number: pr.number, labels: ['needs-issue'] });
                  welcomeMsg += `⚠️ **Warning:** This PR does not seem to link to an open issue. Please edit the PR description to include \`Closes #XX\` to ensure your contribution counts for GSSoC points.\n\n`;
                } else {
                  // 5. Linked Issue Assignee Check
                  try {
                    const { data: issue } = await github.rest.issues.get({
                      owner,
                      repo,
                      issue_number: linkedIssueNumber
                    });

                    const isAssigned = issue.assignees && issue.assignees.some(a => a.login === creator);
                    if (!isAssigned) {
                      await github.rest.issues.addLabels({ owner, repo, issue_number: pr.number, labels: ['unassigned-pr'] });
                      welcomeMsg += `⚠️ **Warning:** You are not currently assigned to the linked issue #${linkedIssueNumber}. Please request assignment on that issue before submitting a PR.\n\n`;
                    } else {
                      welcomeMsg += `✅ Verified: You are assigned to the linked issue #${linkedIssueNumber}.\n\n`;
                    }
                  } catch (e) {
                    console.log("Failed to fetch linked issue", e);
                  }
                }

                welcomeMsg += `Please review any automated suggestions or code review comments that may appear below! We will review your PR as soon as possible!` + STAR_REMINDER;
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: welcomeMsg
                });
              }

              // 6. PR Conflict check (runs on opened and synchronize)
              setTimeout(async () => {
                try {
                  const { data: prDetails } = await github.rest.pulls.get({
                    owner,
                    repo,
                    pull_number: pr.number
                  });

                  if (prDetails.mergeable === false) {
                    await github.rest.issues.addLabels({
                      owner,
                      repo,
                      issue_number: pr.number,
                      labels: ['conflicts']
                    });

                    const conflictMsg = `⚠️ @${creator}, this PR has merge conflicts with the target branch. Please resolve the conflicts and push the updates so it can be merged.` + STAR_REMINDER;
                    await github.rest.issues.createComment({
                      owner,
                      repo,
                      issue_number: pr.number,
                      body: conflictMsg
                    });
                  }
                } catch (e) {
                  console.log("Conflict check failed", e);
                }
              }, 5000);
            }
