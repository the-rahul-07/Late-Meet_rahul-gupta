name: Code Quality and Linting

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@601291d996c6b7704721d6a1795c259ae828c124 # v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - name: Check Code Formatting
        run: npm run format:check

  lint-check:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@601291d996c6b7704721d6a1795c259ae828c124 # v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - name: Run ESLint
        run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@601291d996c6b7704721d6a1795c259ae828c124 # v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - name: TypeScript Type Check
        run: npm run type-check
