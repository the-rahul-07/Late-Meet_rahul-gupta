name: Actionlint

on:
  pull_request:
    branches: [main, develop]
    paths:
      - ".github/workflows/**"
  push:
    branches: [main, develop]
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  actionlint:
    name: Actionlint (Workflow Validation)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          matcher: true
