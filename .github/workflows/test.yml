name: Test & Coverage

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests with Coverage
        run: npx c8 --reporter=text --reporter=json-summary --reporter=lcov npm test
        continue-on-error: false

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 14

      - name: Post Coverage Summary
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          message: |
            ## 📊 Test Coverage Report

            <details>
            <summary>Coverage Results</summary>

            ```
            $(npx c8 report --reporter=text 2>/dev/null || echo "Coverage report unavailable")
            ```

            </details>

            > 🤖 Generated by the Test & Coverage workflow
