name: Spell Check

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  spellcheck:
    name: Spell Check (cspell)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Run cspell
        uses: streetsidesoftware/cspell-action@e464ae97d348eb3beb0c5a6296dc4388ad4484d9 # v6
        with:
          config: cspell.json
          files: "**/*.{ts,md,json,yml,yaml}"
          incremental_files_only: true
          strict: false
