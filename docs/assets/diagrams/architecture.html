<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Late Meet — Architecture Diagram</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0e0e0e;
        --bg2: #161616;
        --bg3: #1e1e1e;
        --border: rgba(255, 255, 255, 0.08);
        --border-hover: rgba(255, 255, 255, 0.18);
        --text: #e8e6e0;
        --text-muted: #888780;
        --text-faint: #555;
        --accent: #d85a30;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 24px 60px;
      }

      header {
        text-align: center;
        margin-bottom: 40px;
      }

      header h1 {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.3px;
        color: var(--text);
        margin-bottom: 8px;
      }

      header p {
        font-size: 14px;
        color: var(--text-muted);
      }

      .badge {
        display: inline-block;
        margin-top: 12px;
        padding: 4px 12px;
        border-radius: 20px;
        border: 1px solid var(--border);
        font-size: 12px;
        color: var(--text-muted);
        background: var(--bg2);
      }

      .diagram-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px 24px;
        width: 100%;
        max-width: 780px;
      }

      svg {
        width: 100%;
        height: auto;
        display: block;
      }

      /* Node hover */
      .node {
        cursor: pointer;
      }
      .node rect,
      .node circle {
        transition:
          filter 0.15s,
          opacity 0.15s;
      }
      .node:hover rect,
      .node:hover circle {
        filter: brightness(1.15);
      }

      /* Tooltip */
      #tooltip {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg3);
        border: 1px solid var(--border-hover);
        border-radius: 10px;
        padding: 10px 18px;
        font-size: 13px;
        color: var(--text);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s;
        white-space: nowrap;
        z-index: 100;
        max-width: 90vw;
        text-align: center;
      }
      #tooltip.show {
        opacity: 1;
      }

      /* Info panel */
      #info-panel {
        margin-top: 24px;
        width: 100%;
        max-width: 780px;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px 24px;
        display: none;
      }
      #info-panel.show {
        display: block;
      }
      #info-panel h2 {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 6px;
      }
      #info-panel p {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.6;
      }
      #info-panel .close-btn {
        float: right;
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 18px;
        cursor: pointer;
        line-height: 1;
        margin-top: -2px;
      }
      #info-panel .close-btn:hover {
        color: var(--text);
      }

      footer {
        margin-top: 40px;
        font-size: 12px;
        color: var(--text-faint);
        text-align: center;
      }
      footer a {
        color: var(--text-muted);
        text-decoration: none;
      }
      footer a:hover {
        color: var(--text);
      }
    </style>
  </head>
  <body>

        Late Meet — Privacy-First AI Meeting Copilot &nbsp;·&nbsp;

    <script>
      const info = {
        "google-meet": {
          title: "Google Meet tab",
          body: "Late Meet detects when you open meet.google.com and activates automatically. The content script is injected into this tab to monitor meeting state and inject UI elements like the Start Copilot button.",
        },
        offscreen: {
          title: "Offscreen document — audio engine",
          body: "Manifest V3 service workers cannot access media APIs directly, so Late Meet uses a hidden Offscreen Document. It uses chrome.tabCapture to grab the tab audio stream, processes it via the MediaRecorder API into audio blobs, and forwards those chunks to the background worker for transcription.",
        },
        content: {
          title: "Content script — UI injector",
          body: 'Runs inside the Google Meet page. Injects the floating "Start Copilot" button, late-joiner briefing overlays, and handles chat automation for welcome messages. It acts as the bridge between the page and the extension runtime — detecting page state and sending messages to background.ts.',
        },
        background: {
          title: "Background service worker — the conductor",
          body: "The central hub of the extension. Coordinates all components — receives audio blobs from the offscreen document, sends them to ElevenLabs for transcription, routes transcripts to OpenAI for summarization, manages session lifecycle, tracks participants, and stores everything in chrome.storage.local.",
        },
        elevenlabs: {
          title: "ElevenLabs Scribe — transcription",
          body: "The primary speech-to-text provider. Audio blobs from the offscreen document are sent to the ElevenLabs Scribe v2 API for high-accuracy multilingual transcription. If ElevenLabs fails, the extension falls back to OpenAI Whisper automatically.",
        },
        openai: {
          title: "OpenAI GPT — meeting intelligence",
          body: "Processes transcript text into structured meeting intelligence. Generates summaries, extracts topics and decisions, identifies action items, and analyses sentiment. Uses rolling context windows to handle long meetings that exceed token limits.",
        },
        storage: {
          title: "chrome.storage.local — local-first storage",
          body: "All meeting data is stored locally in your browser. No cloud sync, no external servers. Stores transcripts, summaries, action items, and your API keys. At the end of a meeting you choose to Save or Discard — nothing leaves your browser without your consent.",
        },
        dashboard: {
          title: "Side panel dashboard — meeting intelligence",
          body: "The main output surface of Late Meet. Displays live summaries, topics, decisions, action items, sentiment analysis, and a meeting timeline. Reads from chrome.storage.local and updates in real time as new intelligence arrives from the background worker.",
        },
        popup: {
          title: "Popup — quick controls",
          body: "The small window that appears when you click the Late Meet icon in your Chrome toolbar. Shows whether the current tab is a supported Meet page, lets you start or stop the Copilot, and links to the dashboard and options page. Kept lightweight because it opens and closes frequently.",
        },
        options: {
          title: "Options page — configuration",
          body: "Where you enter your ElevenLabs and OpenAI API keys (Bring Your Own Key model). Settings are saved to chrome.storage.local and never leave your browser. Also lets you configure transcription preferences and other extension behaviour.",
        },
      };

      function showInfo(id) {
        const panel = document.getElementById("info-panel");
        document.getElementById("info-title").textContent = info[id].title;
        document.getElementById("info-body").textContent = info[id].body;
        panel.classList.add("show");
        panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }

      function closeInfo() {
        document.getElementById("info-panel").classList.remove("show");
      }
    </script>
  </body>
</html>
